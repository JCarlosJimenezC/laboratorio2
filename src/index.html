<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartel Informativo UCR</title>
  <link rel="stylesheet" href="index.css" />

      <div class="sign-row">

      <div class="sign-row">

        <span class="sign-arrow">→</span>
      </div>
      <footer class="sign-footer">
        <span class="sign-footer-text">UCR</span>

    <div class="sign sign-image">
